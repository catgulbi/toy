<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tea Timer 🍵</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f7f3ef;
    color:#4b4b4b;
}
.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}
.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    text-align:center;
}
.timer{
    font-size:48px;
    margin:20px;
}

/* ✅ 진행 바 복구 */
.progress{
    height:8px;
    background:#eee;
    border-radius:10px;
    overflow:hidden;
    margin:10px 0 20px;
}
.progress-bar{
    height:100%;
    width:100%;
    background:#cde2c7;
    transition:width 0.3s;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:20px;
    margin:5px;
    background:#cde2c7;
    color:#3d5a40;
    cursor:pointer;
    transition:0.2s;
    font-weight:500;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

/* ✅ 닉네임 카드 개선 */
.input-card{
    text-align:left;
}
.label{
    font-size:14px;
    color:#777;
    margin-bottom:6px;
    display:block;
}
input, textarea{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:12px;
    border:1px solid #e5e5e5;
    background:#faf9f7;
}
input:focus, textarea:focus{
    outline:none;
    border-color:#cde2c7;
    box-shadow:0 0 0 2px rgba(205,226,199,0.3);
}

.note{
    text-align:left;
    border-bottom:1px solid #eee;
    padding:10px;
}
.name{font-weight:bold;}
.time{font-size:12px;color:#888;}

.alert{
    color:#6b8e6b;
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>🍵 Tea Timer</h2>
<p>시간을 조절하고 Start를 누르면 차 우리기가 시작됩니다 🍃</p>

<div class="timer" id="timeDisplay">03:00</div>

<!-- ✅ 진행바 -->
<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<!-- ✅ 버튼 위치 (오른쪽 + 유지) -->
<button onclick="adjustTime(-10)">-10초</button>
<button onclick="adjustTime(10)">+10초</button><br>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>

<div id="alert"></div>
</div>

<!-- ✅ 닉네임 -->
<div class="card input-card">
<label class="label">닉네임</label>
<input id="nickname" placeholder="오늘의 티 메이트는 누구인가요? 🍵">
</div>

<!-- ✅ 기록 -->
<div class="card">
<textarea id="noteInput" placeholder="차 이름 / 물온도 / 시간 / 맛 (부드러움, 쌉쌀, 산뜻 등)"></textarea>
<button onclick="addNote()">기록 공유</button>
</div>

<div class="card" id="notesList"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBs-rsGjDqPm_NwLe1OfQYYq8mFkUD-Pwg",
  authDomain: "tea-timer-32076.firebaseapp.com",
  projectId: "tea-timer-32076",
  storageBucket: "tea-timer-32076.firebasestorage.app",
  messagingSenderId: "743233533025",
  appId: "1:743233533025:web:a2d9d7e7054acf51c6a620"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 타이머
let total = 180;
let remain = total;
let timer = null;

function updateUI(){
    document.getElementById("timeDisplay").innerText =
        `${String(Math.floor(remain/60)).padStart(2,'0')}:${String(remain%60).padStart(2,'0')}`;

    const percent = (remain / total) * 100;
    document.getElementById("progressBar").style.width = percent + "%";
}

window.adjustTime = function(s){
    remain = Math.max(0, remain + s);
    total = remain;
    updateUI();
}

window.startTimer = function(){
    if(timer) return;
    timer = setInterval(()=>{
        if(remain>0){
            remain--;
            updateUI();
        } else {
            clearInterval(timer);
            timer=null;
            done();
        }
    },1000);
}

window.pauseTimer = function(){
    clearInterval(timer);
    timer=null;
}

window.resetTimer = function(){
    window.pauseTimer();
    remain=total;
    updateUI();
}

function done(){
    document.getElementById("alert").innerHTML =
        "<div class='alert'>차가 다 우려졌어요 🍵</div>";

    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.frequency.value = 700;
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(()=>osc.stop(),300);
}

// 닉네임 저장
const nick = document.getElementById("nickname");
nick.value = localStorage.getItem("nick") || "";

nick.addEventListener("input", ()=>{
    localStorage.setItem("nick", nick.value);
});

// Firebase
const notesRef = collection(db, "notes");

window.addNote = async function(){
    const name = nick.value || "익명";
    const text = document.getElementById("noteInput").value;

    if(!text.trim()) return;

    await addDoc(notesRef,{
        name,
        note:text,
        timestamp:Date.now()
    });

    document.getElementById("noteInput").value="";
}

const q = query(notesRef, orderBy("timestamp","desc"), limit(50));

onSnapshot(q,(snapshot)=>{
    const list = document.getElementById("notesList");
    list.innerHTML="";

    snapshot.forEach(doc=>{
        const n = doc.data();

        const div=document.createElement("div");
        div.className="note";

        const time = new Date(n.timestamp)
            .toLocaleTimeString("ko-KR",{hour:'2-digit', minute:'2-digit'});

        div.innerHTML=`
            <div class="name">${n.name}</div>
            <div>${n.note}</div>
            <div class="time">${time}</div>
        `;

        list.appendChild(div);
    });
});

updateUI();
</script>

</body>
</html>
