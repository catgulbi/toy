<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tea Timer ☕</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f7f3ef;
    color:#444;
}
.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}
.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    text-align:center;
}
.timer{
    font-size:48px;
    margin:20px;
}
button{
    padding:10px;
    border:none;
    border-radius:20px;
    margin:5px;
    background:#d8c3a5;
    color:white;
    cursor:pointer;
    transition:0.2s;
}
button:hover{
    transform:scale(1.05);
}
input, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ddd;
}
.note{
    text-align:left;
    border-bottom:1px solid #eee;
    padding:10px;
}
.name{font-weight:bold;}
.time{font-size:12px;color:#777;}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>☕ Tea Timer</h2>
<p>시간을 조절하고 Start를 누르면 차 우리기가 시작됩니다</p>

<div class="timer" id="timeDisplay">03:00</div>

<!-- ✅ 버튼 순서 변경: 왼쪽 -, 오른쪽 + -->
<button onclick="adjustTime(-10)">-10초</button>
<button onclick="adjustTime(10)">+10초</button><br>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>

<div id="alert"></div>
</div>

<div class="card">
<input id="nickname" placeholder="닉네임 입력">
</div>

<div class="card">
<textarea id="noteInput" placeholder="차 이름 / 물온도 / 시간 / 맛"></textarea>
<button onclick="addNote()">기록 공유</button>
</div>

<div class="card" id="notesList"></div>

</div>

<!-- ✅ Firebase (최신 모듈 방식) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

// ✅ 당신 config 적용 완료
const firebaseConfig = {
  apiKey: "AIzaSyBs-rsGjDqPm_NwLe1OfQYYq8mFkUD-Pwg",
  authDomain: "tea-timer-32076.firebaseapp.com",
  projectId: "tea-timer-32076",
  storageBucket: "tea-timer-32076.firebasestorage.app",
  messagingSenderId: "743233533025",
  appId: "1:743233533025:web:a2d9d7e7054acf51c6a620",
  measurementId: "G-6P9GG8LYV5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ----------------------
// 타이머
// ----------------------
let total = 180;
let remain = total;
let timer = null;

function updateUI(){
    document.getElementById("timeDisplay").innerText =
        `${String(Math.floor(remain/60)).padStart(2,'0')}:${String(remain%60).padStart(2,'0')}`;
}

window.adjustTime = function(s){
    remain = Math.max(0, remain + s);
    total = remain;
    updateUI();
}

window.startTimer = function(){
    if(timer) return;
    timer = setInterval(()=>{
        if(remain > 0){
            remain--;
            updateUI();
        } else {
            clearInterval(timer);
            timer=null;
            done();
        }
    },1000);
}

window.pauseTimer = function(){
    clearInterval(timer);
    timer=null;
}

window.resetTimer = function(){
    window.pauseTimer();
    remain=total;
    updateUI();
}

function done(){
    document.getElementById("alert").innerText="차가 다 우려졌어요 ☕";

    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.frequency.value=700;
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(()=>osc.stop(),300);
}

// ----------------------
// 닉네임 저장
// ----------------------
const nick = document.getElementById("nickname");
nick.value = localStorage.getItem("nick") || "";

nick.addEventListener("input", ()=>{
    localStorage.setItem("nick", nick.value);
});

// ----------------------
// Firebase 공유
// ----------------------
const notesRef = collection(db, "notes");

window.addNote = async function(){
    const name = nick.value || "익명";
    const text = document.getElementById("noteInput").value;

    if(!text.trim()) return;

    await addDoc(notesRef, {
        name,
        note:text,
        timestamp:Date.now()
    });

    document.getElementById("noteInput").value="";
}

// ✅ 실시간 반영
const q = query(notesRef, orderBy("timestamp","desc"), limit(50));

onSnapshot(q, (snapshot)=>{
    const list = document.getElementById("notesList");
    list.innerHTML="";

    snapshot.forEach(doc=>{
        const n = doc.data();

        const div=document.createElement("div");
        div.className="note";

        const time = new Date(n.timestamp)
            .toLocaleTimeString("ko-KR",{hour:'2-digit', minute:'2-digit'});

        div.innerHTML=`
            <div class="name">${n.name}</div>
            <div>${n.note}</div>
            <div class="time">${time}</div>
        `;

        list.appendChild(div);
    });
});

updateUI();

</script>

</body>
</html>
